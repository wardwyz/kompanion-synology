<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>{{ block "title" . }}KOmpanion{{ end }}</title>
    <link rel="stylesheet" href="/static/monospace.css">
    <link rel="stylesheet" href="/static/static.css">
</head>

<body>
    <div class="app-shell">
        <header class="topbar">
            <a href="/books/" class="brand">
                <span class="brand-mark">K</span>
                <span class="brand-copy">
                    <strong>KOmpanion</strong>
                    <span>更简洁的电子书与阅读同步中心</span>
                </span>
            </a>

            <nav class="topnav" aria-label="主导航">
                {{ if .isAuthenticated }}
                <a href="/books/">书籍</a>
                <a href="/stats/">统计</a>
                <a href="/devices/">设备</a>
                <a href="/auth/logout/">退出登录</a>
                {{ else }}
                <a href="/auth/login">登录</a>
                {{ end }}
            </nav>
        </header>

        <main>
            {{ block "content" . }}默认内容{{ end }}
        </main>

        <footer class="footer">
            <div class="footer-card">
                由 <a href="https://github.com/vanadium23/kompanion/">KOmpanion</a> 驱动，
                版本：<strong>{{ Version }}</strong>，
                页面耗时：<strong>{{ LoadTimes .startTime }}</strong>
            </div>
        </footer>
    </div>
</body>

</html>
