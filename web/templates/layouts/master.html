<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>{{ block "title" . }}KOmpanion{{ end }}</title>
    <link rel="stylesheet" href="/static/monospace.css">
    <link rel="stylesheet" href="/static/static.css">
</head>

<body>
    <div class="site-shell">
        <header class="site-header">
            <div class="brand-block">
                <div class="brand-mark">
                    <span class="brand-icon">📚</span>
                    <span>KOmpanion</span>
                </div>
                <p class="brand-subtitle">简洁、清晰、像书架一样管理你的电子书与阅读进度。</p>
            </div>

            {{ if .isAuthenticated }}
            <nav class="nav-links" aria-label="主导航">
                <a class="nav-link" href="/books/">书架</a>
                <a class="nav-link" href="/stats/">统计</a>
                <a class="nav-link" href="/devices/">设备</a>
                <a class="nav-link" href="/auth/logout/">退出</a>
            </nav>
            {{ else }}
            <div class="nav-links">
                <span class="nav-link">登录后即可进入书架</span>
            </div>
            {{ end}}
        </header>

        <main>
            {{ block "content" . }}默认内容{{ end }}
        </main>

        <footer>
            <hr>
            <p class="footer-note">
                由 <a href="https://github.com/vanadium23/kompanion/">KOmpanion</a> 驱动，
                版本：<strong>{{ Version }}</strong>，
                页面耗时：<strong>{{ LoadTimes .startTime }}</strong>
            </p>
        </footer>
    </div>
</body>

</html>
