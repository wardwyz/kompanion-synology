{{ define "title" }}阅读笔记 - KOmpanion{{ end }}

{{ define "content" }}
<h1>阅读笔记</h1>

{{ if not .groups }}
<p>暂无笔记。</p>
{{ end }}

{{ range .groups }}
<section class="reading-note-book-group">
    {{ range .Notes }}
    <article class="reading-note">
        <header class="reading-note-header">
            <div>
                <small>
                    {{ .DisplayCreatedAt }} 
                    {{ if .DocumentID }} · 文档标识: <code>{{ .DocumentID }}</code>{{ end }}
                </small>
            </div>
            <form method="post" action="/notes/{{ .ID }}/delete" onsubmit="return confirm('确认删除这条笔记吗？');">
                <button type="submit">删除</button>
            </form>
        </header>
        <h4>{{ .Title }}</h4>
        <div class="reading-note-body">{{ .BodyMarkdown }}</div>
    </article>
    {{ end }}
</section>
{{ end }}
{{ end }}
